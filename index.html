<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 14l9-5-9-5-9 5 9 5z"/>
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                    <path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/>
                </svg>
                <h1>Smart Study Planner</h1>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <!-- Subject List Card -->
        <section class="card subjects-card" id="subjectsCard">
            <div class="card-header">
                <h2>Subjects</h2>
                <span class="subject-count" id="subjectCount">0</span>
            </div>
            <div class="add-subject-form">
                <input type="text" id="subjectName" class="input" placeholder="Subject name" required>
                <input type="date" id="subjectDeadline" class="input" required>
                <button class="btn btn-primary" id="addSubjectBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Add
                </button>
            </div>
            <div class="subjects-list" id="subjectsList">
                <!-- Subjects will be rendered here -->
            </div>
            <div class="empty-state" id="subjectsEmpty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                <p>No subjects yet</p>
                <span>Add a subject to get started</span>
            </div>
        </section>

        <!-- Daily Study Plan Card -->
        <section class="card plan-card" id="planCard">
            <div class="card-header">
                <h2>Today's Study Plan</h2>
                <span class="plan-date" id="planDate"></span>
            </div>
            <div class="plan-actions">
                <button class="btn btn-secondary" id="generatePlanBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Generate New Plan
                </button>
            </div>
            <div class="plan-list" id="planList">
                <!-- Plan sessions will be rendered here -->
            </div>
            <div class="empty-state" id="planEmpty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                </svg>
                <p>No study plan yet</p>
                <span>Add subjects to generate a plan</span>
            </div>
        </section>

        <!-- Progress Tracker Card -->
        <section class="card progress-card" id="progressCard">
            <div class="card-header">
                <h2>Progress</h2>
            </div>
            <div class="progress-stats">
                <div class="progress-ring-container">
                    <svg class="progress-ring" viewBox="0 0 120 120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="50"/>
                        <circle class="progress-ring-fill" cx="60" cy="60" r="50" id="progressRing"/>
                    </svg>
                    <div class="progress-percentage" id="progressPercentage">0%</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="totalCompleted">0</span>
                        <span class="stat-label">Sessions Completed</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="subjectsCompleted">0</span>
                        <span class="stat-label">Subjects Done</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="currentStreak">0</span>
                        <span class="stat-label">Day Streak</span>
                    </div>
                </div>
            </div>
            <div class="weekly-chart">
                <h3>This Week</h3>
                <div class="chart-bars" id="weeklyChart">
                    <!-- Chart bars will be rendered here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Confetti container for celebrations -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script src="app.js"></script>
</body>
</html>
